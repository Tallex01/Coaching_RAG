<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coaching RAG Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Coaching RAG Assistant</h1>
            <p class="subtitle">Query your coaching reports instantly</p>
        </header>

        <main>
            <div class="query-section">
                <div class="form-group">
                    <label for="collection-select">Select Report Type:</label>
                    <select id="collection-select" class="dropdown">
                        <option value="">-- Choose a Report --</option>
                        <option value="roster_2026">Roster 2026</option>
                        <option value="opponents_2026">Opponents 2026</option>
                        <option value="scouting_2027">Scouting 2027</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="question-input">Your Question:</label>
                    <textarea 
                        id="question-input" 
                        class="textarea"
                        placeholder="Ask a question about the selected report..."
                        rows="4"></textarea>
                </div>

                <button id="submit-btn" class="submit-btn">Submit Question</button>
            </div>

            <div id="response-section" class="response-section hidden">
                <div class="response-header">
                    <h2>Answer</h2>
                    <button id="close-btn" class="close-btn">&times;</button>
                </div>
                <div id="answer-text" class="answer-text"></div>
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Generating answer...</p>
                </div>
            </div>

            <div id="error-message" class="error-message hidden"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
